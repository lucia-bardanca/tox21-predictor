<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predicción de Toxicidad Tox21</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; width: 100%; text-align: center; }
        input[type="text"] { width: calc(100% - 22px); padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { background-color: #0056b3; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-size: 16px; cursor: pointer; transition: background 0.3s; width: 100%; }
        button:hover { background-color: #004494; }
        #result { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; font-weight: bold; }
        .toxic { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .safe { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .loading { color: #666; font-style: italic; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Analizador de Toxicidad (SR-MMP)</h2>
    <p>Introduce la estructura química en formato SMILES:</p>
    <input type="text" id="smilesInput" placeholder="Ej: CC(=O)OC1=CC=CC=C1C(=O)O (Aspirina)">
    <button onclick="predict()">Analizar Molécula</button>
    <div id="loading" class="loading">Procesando descriptores y ejecutando modelo...</div>
    <div id="result"></div>
</div>

<script>
    async function predict() {
        const smiles = document.getElementById('smilesInput').value.trim();
        const resultDiv = document.getElementById('result');
        const loadingDiv = document.getElementById('loading');

        if (!smiles) {
            alert("Por favor, introduce un SMILES.");
            return;
        }

        resultDiv.style.display = 'none';
        loadingDiv.style.display = 'block';

        try {
            const response = await fetch('/api/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ smiles: smiles })
            });

            const data = await response.json();
            loadingDiv.style.display = 'none';

            if (data.error) {
                resultDiv.className = 'toxic'; // Reusar clase para errores
                resultDiv.innerHTML = `Error: ${data.error}`;
                resultDiv.style.display = 'block';
                return;
            }

            const isToxic = data.is_toxic;
            const prob = (data.probability * 100).toFixed(2);
            
            resultDiv.className = isToxic ? 'toxic' : 'safe';
            resultDiv.innerHTML = isToxic 
                ? `⚠️ Alerta de Toxicidad<br><br>Probabilidad estimada: ${prob}%`
                : `✅ Molécula No Tóxica<br><br>Probabilidad de toxicidad: ${prob}%`;
            
            resultDiv.style.display = 'block';

        } catch (error) {
            loadingDiv.style.display = 'none';
            resultDiv.className = 'toxic';
            resultDiv.innerHTML = "Error de conexión con el servidor.";
            resultDiv.style.display = 'block';
        }
    }
</script>

</body>
</html>
